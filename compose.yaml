name: evolver

services:
  evolver:
    image: andypost/evolver-php
    build:
      context: .
      args:
        USER_ID: ${LOCAL_UID:-1000}
        GROUP_ID: ${LOCAL_GID:-1000}
    working_dir: /app
    volumes:
      - .:/app
      - ./.cache/composer:/home/evolver/.composer/cache:cached
      - ../drupal:/mnt/drupal:ro
    ports:
      - 127.0.0.1:8080:8080
    environment:
      EVOLVER_DB: /app/.data/evolver.sqlite
      EVOLVER_GRAMMAR_PATH: /usr/lib
    command:
      - sh
      - -c
      - "php85 bin/evolver queue:work --sleep=2 & php85 bin/evolver serve --host=0.0.0.0 --port=8080"
    stdin_open: true
    tty: true
    init: true
